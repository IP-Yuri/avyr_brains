name: AVYR Dispatch Engine Schedule

on:
  schedule:
    # Runs at 07:00 UTC, Monday through Friday ONLY
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # Allows you to click a "Run Now" button to test it

jobs:
  run-avyr-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper (app.py)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }} 
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: python -u app.py

     - name: Run AI Brain (avyr_brain.py)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }} 
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python -u avyr_brain.py
